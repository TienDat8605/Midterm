<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{{{ PRODUCT_NAME }}}</title>
  <style>
    html, body, #unity-container, #unity-canvas {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }

    #unity-container {
      position: fixed;
      inset: 0;
    }

    #unity-canvas {
      display: block;
      outline: none;
    }

    #unity-loading {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(420px, 70vw);
      transform: translate(-50%, -50%);
      color: #e6d2b4;
      font: bold 16px sans-serif;
      text-align: center;
    }

    #unity-progress {
      height: 12px;
      margin-top: 12px;
      border: 2px solid #d4a353;
    }

    #unity-progress-bar {
      width: 0;
      height: 100%;
      background: #87b93b;
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" width="1280" height="720" tabindex="-1"></canvas>
    <div id="unity-loading">
      <div>LOADING</div>
      <div id="unity-progress"><div id="unity-progress-bar"></div></div>
    </div>
  </div>
  <script src="Build/{{{ LOADER_FILENAME }}}"></script>
  <script>
    const canvas = document.querySelector("#unity-canvas");
    const loading = document.querySelector("#unity-loading");
    const progress = document.querySelector("#unity-progress-bar");
    const config = {
      arguments: [],
      dataUrl: "Build/{{{ DATA_FILENAME }}}",
      frameworkUrl: "Build/{{{ FRAMEWORK_FILENAME }}}",
#if USE_WASM
      codeUrl: "Build/{{{ CODE_FILENAME }}}",
#endif
#if MEMORY_FILENAME
      memoryUrl: "Build/{{{ MEMORY_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
      symbolsUrl: "Build/{{{ SYMBOLS_FILENAME }}}",
#endif
      streamingAssetsUrl: "StreamingAssets",
      companyName: "{{{ COMPANY_NAME }}}",
      productName: "{{{ PRODUCT_NAME }}}",
      productVersion: "{{{ PRODUCT_VERSION }}}",
      matchWebGLToCanvasSize: true,
      devicePixelRatio: window.devicePixelRatio || 1
    };

    createUnityInstance(canvas, config, value => {
      progress.style.width = (value * 100) + "%";
    }).then(() => {
      loading.style.display = "none";
    }).catch(message => {
      loading.textContent = message;
    });
  </script>
</body>
</html>
